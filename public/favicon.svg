<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#17191e" />
      <stop offset="100%" stop-color="#090a0c" />
    </radialGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80e5d2" />
      <stop offset="50%" stop-color="#00c6a2" />
      <stop offset="100%" stop-color="#00675d" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer subtle outline -->
  <rect x="4" y="4" width="504" height="504" rx="124" fill="none" stroke="#26d0b1" stroke-width="8" opacity="0.15" />

  <!-- Abstract P & Upward Trend Symbol -->
  <g transform="translate(64, 64)">
    <!-- Stem: EV Growth Column -->
    <rect x="80" y="80" width="56" height="240" rx="28" fill="url(#accentGrad)" filter="url(#neonGlow)" />
    
    <!-- Loop of the 'P': Sweeping dynamic curve -->
    <path d="M 136,108 C 240,108 280,148 280,200 C 280,252 240,292 136,292" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="56" 
          stroke-linecap="round" 
          filter="url(#neonGlow)" />
          
    <!-- Glowing green star / sparkle at the top right intersection representing value edge -->
    <path d="M 280,100 L 290,120 L 310,120 L 295,135 L 300,155 L 280,142 L 260,155 L 265,135 L 250,120 L 270,120 Z" 
          fill="#e0f8f7" 
          filter="url(#neonGlow)" />
  </g>
</svg>